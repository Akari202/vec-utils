name: Rust

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          ["--all-features", "--no-default-features --features all-nostd", "--no-default-features"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - name: Run tests
        run: cargo test --verbose ${{ matrix.features }}

  publish:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - name: Publish to crates.io
        run: cargo publish --package bektor --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
